<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SBTI人格测试 | 经典MBTI + 今日热梗</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #F5F7FB;
            color: #1F2937;
            line-height: 1.5;
        }

        .page {
            min-height: 100vh;
            background: #F5F7FB;
            padding: 20px 16px 40px;
        }

        /* 卡片样式 */
        .card {
            background: #FFFFFF;
            border-radius: 32px;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.05), 0 2px 4px rgba(0, 0, 0, 0.02);
            padding: 24px 20px;
            transition: all 0.2s ease;
        }

        /* 按钮 */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            border-radius: 60px;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 500;
            background: #FFFFFF;
            color: #4F46E5;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
            color: white;
            box-shadow: 0 6px 14px rgba(79, 70, 229, 0.25);
        }

        .btn-primary:active {
            transform: scale(0.97);
            opacity: 0.9;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #E2E8F0;
            color: #4B5563;
        }

        .btn-outline:active {
            background: #F9FAFB;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #4F46E5, #A855F7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }

        .subtitle {
            font-size: 14px;
            color: #6B7280;
            margin-bottom: 20px;
        }

        /* 进度条 */
        .progress-section {
            margin-bottom: 24px;
        }
        .progress-bar-bg {
            background: #E5E7EB;
            border-radius: 12px;
            height: 8px;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #4F46E5, #A855F7);
            width: 0%;
            height: 100%;
            border-radius: 12px;
            transition: width 0.2s ease;
        }
        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #6B7280;
            margin-top: 8px;
        }

        .question-text {
            font-size: 20px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 32px;
            color: #111827;
        }

        .option-item {
            background: #F9FAFB;
            border-radius: 20px;
            padding: 18px 20px;
            margin-bottom: 14px;
            border: 1.5px solid transparent;
            transition: all 0.2s;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .option-marker {
            width: 26px;
            height: 26px;
            border-radius: 26px;
            background: white;
            border: 2px solid #D1D5DB;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: #6B7280;
        }
        .option-text {
            font-size: 16px;
            font-weight: 500;
            color: #374151;
            flex: 1;
        }
        .option-item.active {
            background: #EEF2FF;
            border-color: #4F46E5;
        }
        .option-item.active .option-marker {
            background: #4F46E5;
            border-color: #4F46E5;
            color: white;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }
        .nav-buttons .btn {
            flex: 1;
        }

        /* 结果页样式 */
        .result-type {
            text-align: center;
            margin-bottom: 24px;
        }
        .result-badge {
            background: linear-gradient(135deg, #4F46E510, #A855F710);
            display: inline-block;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #4F46E5;
            margin-bottom: 12px;
        }
        .result-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .result-desc {
            color: #4B5563;
            font-size: 15px;
            margin: 16px 0;
            line-height: 1.5;
        }
        .hot-tag-card {
            background: linear-gradient(120deg, #FFF9F0, #FFF3E6);
            border-radius: 28px;
            padding: 18px 20px;
            margin: 20px 0 16px;
            border-left: 6px solid #F59E0B;
        }
        .hot-tag-title {
            font-size: 16px;
            font-weight: 600;
            color: #B45309;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .hot-tag-name {
            font-size: 28px;
            font-weight: 800;
            color: #D97706;
            letter-spacing: 1px;
            margin: 6px 0;
        }
        .hot-tag-desc {
            font-size: 14px;
            color: #92400E;
            line-height: 1.4;
        }
        .dimension-row {
            background: #F9FAFB;
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .dimension-label {
            font-weight: 600;
            width: 50px;
        }
        .dimension-bar-container {
            flex: 1;
            margin: 0 12px;
            height: 8px;
            background: #E5E7EB;
            border-radius: 10px;
            overflow: hidden;
        }
        .dimension-bar {
            height: 100%;
            background: #4F46E5;
            border-radius: 10px;
            width: 0%;
        }
        .dimension-percent {
            font-size: 13px;
            font-weight: 500;
            color: #4F46E5;
            min-width: 48px;
            text-align: right;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }
        .intro-buzz {
            background: #FEF3C7;
            border-radius: 24px;
            padding: 16px;
            margin: 20px 0;
            font-size: 14px;
            color: #92400E;
            border: 1px solid #FFEDD5;
        }
        .feature-list {
            margin: 24px 0;
            background: #F9FAFB;
            border-radius: 24px;
            padding: 16px 20px;
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .dot {
            width: 6px;
            height: 6px;
            background: #4F46E5;
            border-radius: 6px;
        }
        footer {
            text-align: center;
            font-size: 12px;
            color: #9CA3AF;
            margin-top: 32px;
        }
        .emoji-big {
            font-size: 42px;
            text-align: center;
            margin: 8px 0;
        }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // ---------- 经典 MBTI 题库 (16题, 四个维度) ----------
    const QUESTIONS = [
        { text: "你更倾向于如何度过周末？", optionA: "参加社交活动或与朋友聚会", optionB: "独自享受安静时光", dimension: "EI", directionA: "E" },
        { text: "在解决问题时，你更依赖？", optionA: "事实和经验", optionB: "直觉和灵感", dimension: "SN", directionA: "S" },
        { text: "你通常做决定时更看重？", optionA: "逻辑和原则", optionB: "情感和价值观", dimension: "TF", directionA: "T" },
        { text: "你更喜欢哪种工作方式？", optionA: "制定计划并按计划执行", optionB: "随机应变，灵活处理", dimension: "JP", directionA: "J" },
        { text: "与人相处后你通常感到？", optionA: "精力充沛", optionB: "需要独处恢复精力", dimension: "EI", directionA: "E" },
        { text: "你更关注？", optionA: "现实细节", optionB: "未来可能性", dimension: "SN", directionA: "S" },
        { text: "当你不同意别人时，你更倾向于？", optionA: "直接提出逻辑反驳", optionB: "考虑他人感受委婉表达", dimension: "TF", directionA: "T" },
        { text: "你更喜欢？", optionA: "将物品摆放得井井有条", optionB: "喜欢随意放置", dimension: "JP", directionA: "J" },
        { text: "在群体中你通常？", optionA: "主动与他人交谈", optionB: "保持倾听，少发言", dimension: "EI", directionA: "E" },
        { text: "你更擅长？", optionA: "处理具体任务", optionB: "构思新点子", dimension: "SN", directionA: "S" },
        { text: "什么对你更重要？", optionA: "公平公正", optionB: "和谐共处", dimension: "TF", directionA: "T" },
        { text: "你通常？", optionA: "提前安排日程", optionB: "临时决定做什么", dimension: "JP", directionA: "J" },
        { text: "你更享受？", optionA: "热闹的环境", optionB: "安静的环境", dimension: "EI", directionA: "E" },
        { text: "你更愿意学习？", optionA: "实用技能", optionB: "抽象理论", dimension: "SN", directionA: "S" },
        { text: "评价一个方案时，你更看重？", optionA: "有效性和结果", optionB: "对人的影响", dimension: "TF", directionA: "T" },
        { text: "你倾向于？", optionA: "完成一项任务后再做下一项", optionB: "同时处理多个任务", dimension: "JP", directionA: "J" }
    ];

    // ---------- MBTI 16种人格详细描述 ----------
    const TYPE_DETAILS = {
        "INTJ": { name: "建筑师", desc: "富有想象力和战略性的思想家，一切皆在计划之中。拥有独特的理性与远见，擅长构建复杂系统。" },
        "INTP": { name: "逻辑学家", desc: "具有创造力的思考者，对知识有无尽渴望，喜欢探寻理论背后的原理，理性客观。" },
        "ENTJ": { name: "指挥官", desc: "大胆、富有想象力且意志强大的领导者，总能创建解决问题的方法，天生主导者。" },
        "ENTP": { name: "辩论家", desc: "聪明好奇的思考者，无法抵抗智力挑战，喜欢头脑风暴并挑战既有观点。" },
        "INFJ": { name: "提倡者", desc: "安静而神秘，同时鼓舞人心且不知疲倦的理想主义者，具有深刻的洞察力。" },
        "INFP": { name: "调停者", desc: "诗意而善良的利他主义者，总是热情地帮助他人，富有创造力和信念感。" },
        "ENFJ": { name: "主人公", desc: "富有魅力且鼓舞人心的领导者，能让周围的人变得更好，真诚而利他。" },
        "ENFP": { name: "竞选者", desc: "热情、有创造力、爱社交的自由人，总能找到理由微笑，充满好奇心。" },
        "ISTJ": { name: "物流师", desc: "务实且注重事实，具有可靠的执行力，对责任极其认真，传统而稳重。" },
        "ISFJ": { name: "守护者", desc: "专注而温暖的守护者，默默为他人付出，注重细节且极具奉献精神。" },
        "ESTJ": { name: "总经理", desc: "高效务实的管理者，重视秩序和传统，擅长组织并完成目标。" },
        "ESFJ": { name: "执政官", desc: "热心而善于合作，重视和谐与社群，总希望以实际方式帮助他人。" },
        "ISTP": { name: "鉴赏家", desc: "大胆而实际的实验家，擅长使用各种工具，对周围环境有独特理解。" },
        "ISFP": { name: "探险家", desc: "灵活有魅力的艺术家，时刻准备探索新体验，活在当下且充满感性。" },
        "ESTP": { name: "企业家", desc: "聪明、精力充沛且极具感知力，享受冒险和行动，擅长说服他人。" },
        "ESFP": { name: "表演者", desc: "自发、精力充沛而富有娱乐精神的表演者，让周围的气氛充满乐趣。" }
    };
    // 确保所有类型都有描述
    const allMbtiKeys = ["INTJ","INTP","ENTJ","ENTP","INFJ","INFP","ENFJ","ENFP","ISTJ","ISFJ","ESTJ","ESFJ","ISTP","ISFP","ESTP","ESFP"];
    allMbtiKeys.forEach(t => { if (!TYPE_DETAILS[t]) TYPE_DETAILS[t] = { name: "探索者", desc: "独一无二的性格组合，充满潜力和魅力，不断探索自我与世界。" }; });

    // 计算MBTI类型 (四个维度得分>=2 倾向首字母)
    function computeMBTI(answers) {
        let scores = { EI: 0, SN: 0, TF: 0, JP: 0 };
        QUESTIONS.forEach((q, idx) => {
            const ans = answers[idx];
            if (ans === 0) scores[q.dimension] += 1;
        });
        const getType = (dim, first, second) => scores[dim] >= 2 ? first : second;
        const ei = getType("EI", "E", "I");
        const sn = getType("SN", "S", "N");
        const tf = getType("TF", "T", "F");
        const jp = getType("JP", "J", "P");
        return ei + sn + tf + jp;
    }

    // 获取各维度倾向数据 (用于图表)
    function getDimensionPercentages(answers) {
        let scores = { EI: 0, SN: 0, TF: 0, JP: 0 };
        QUESTIONS.forEach((q, idx) => {
            if (answers[idx] === 0) scores[q.dimension] += 1;
        });
        return {
            EI: { score: scores.EI, total: 4, percent: (scores.EI / 4) * 100, leftLetter: "E", rightLetter: "I" },
            SN: { score: scores.SN, total: 4, percent: (scores.SN / 4) * 100, leftLetter: "S", rightLetter: "N" },
            TF: { score: scores.TF, total: 4, percent: (scores.TF / 4) * 100, leftLetter: "T", rightLetter: "F" },
            JP: { score: scores.JP, total: 4, percent: (scores.JP / 4) * 100, leftLetter: "J", rightLetter: "P" }
        };
    }

    // ---------- 🔥 今日SBTI热梗映射 (基于MBTI维度得分 & 流行梗) ----------
    // 根据E/I, S/N, T/F, J/P 得分组合出最适配的「热梗人格」
    // 参考近日刷屏的梗: 死者、吗喽、ATM-er、尤物、酒鬼、恋爱脑、天生丽质、老黄牛等
    function getHotSticker(dimensionScores, mbtiType) {
        // dimensionScores: {EI, SN, TF, JP} 值为0-4
        const ei = dimensionScores.EI;     // E倾向得分
        const sn = dimensionScores.SN;
        const tf = dimensionScores.TF;
        const jp = dimensionScores.JP;
        
        // 根据组合逻辑给出趣味标签
        // 高I + 高P (内向且随性) -> "死者" (不想社交，感觉被掏空)
        if (ei <= 1 && jp <= 1) {  // I分高 (ei≤1表示E得分低，即I≥3) 且 P得分高(jp≤1 表示J得分低→P倾向高)
            return { name: "🧟 死者", emoji: "🪦", desc: "灵魂出窍，只想躺平。上班如上坟，社交如受刑，日常精神状态：已去世，勿扰。" };
        }
        // 高I + 高J (内向但有条理) -> "吗喽" (打工猴)
        if (ei <= 1 && jp >= 3) {
            return { name: "🐒 吗喽", emoji: "🍌", desc: "打工人的自我修养：勤勤恳恳，任劳任怨，偶尔发疯，本质是个可爱猴子。" };
        }
        // 高E + 高F (外向+情感) -> "尤物" 或 "社交甜心"
        if (ei >= 3 && tf <= 1) {
            return { name: "💃 尤物", emoji: "✨", desc: "人间绝色，魅力磁场。走到哪里都发光，氛围感拉满，朋友眼中的万人迷。" };
        }
        // 高E + 高T (外向+理性) -> "ATM-er" (人形提款机，喜欢买单或掌控)
        if (ei >= 3 && tf >= 3) {
            return { name: "💰 ATM-er", emoji: "🏧", desc: "行走的付款码，聚会中的金主爸爸。习惯照顾大家，钱包时常空虚但快乐。" };
        }
        // 高F + 高J (情感+计划) -> "恋爱脑"
        if (tf <= 1 && jp >= 3) {
            return { name: "💘 恋爱脑", emoji: "😍", desc: "爱情至上，为爱痴狂。看到甜甜的剧情就代入，容易上头也容易心碎。" };
        }
        // 高S + 高J -> "老黄牛" / 踏实打工人
        if (sn <= 1 && jp >= 3) {
            return { name: "🐂 老黄牛", emoji: "🌾", desc: "踏实可靠，默默耕耘。团队里最稳定的基石，永远可以信赖的务实派。" };
        }
        // 高N + 高P -> "野生艺术家" / 摸鱼哲学家
        if (sn >= 3 && jp <= 1) {
            return { name: "🎨 野生哲学家", emoji: "🍃", desc: "白日梦想家，灵感喷射机。生活可以乱，精神必须富足，日常摸鱼中悟道。" };
        }
        // 剩余情况搭配趣味梗
        if (mbtiType.includes("IN") && ei <= 1) return { name: "🌙 深夜哲学家", emoji: "🕯️", desc: "喜欢在夜晚思考人生，内心戏丰富，擅长自我拉扯。" };
        if (mbtiType.includes("ES")) return { name: "🔥 气氛组组长", emoji: "🎉", desc: "聚会没你不行，快乐瀑布，永远的能量站。" };
        
        // 默认梗
        return { name: "🌟 独特星人", emoji: "⭐", desc: "无法被简单定义，你的个性就是最棒的标签。保持神秘，继续闪耀。" };
    }

    // ---------- 页面状态 ----------
    let currentPage = "index";   // index, test, result
    let testAnswers = new Array(QUESTIONS.length).fill(null);
    let currentQuestionIndex = 0;
    let computedType = "";
    let dimensionData = null;
    let hotStickerResult = null;

    const app = document.getElementById("app");

    function render() {
        if (currentPage === "index") renderIndex();
        else if (currentPage === "test") renderTest();
        else if (currentPage === "result") renderResult();
    }

    // 首页 - 融入今日SBTI热潮介绍
    function renderIndex() {
        app.innerHTML = `
            <div class="page">
                <div class="card" style="text-align: center; padding: 28px 22px;">
                    <div class="emoji-big">🤯🔥</div>
                    <div class="title">SBTI 人格测试</div>
                    <div class="subtitle" style="margin-bottom: 6px;">经典MBTI × 今日网络热梗</div>
                    <div class="intro-buzz">
                        🚀 这两天朋友圈刷屏的「死者」「吗喽」「ATM-er」都出自SBTI！<br>
                        一个劝朋友戒酒的玩笑测试，引爆全网自嘲狂欢。<br>
                        现在，测你的正经MBTI + 领取你的专属热梗人格✨
                    </div>
                    <div class="feature-list">
                        <div class="feature-item"><span class="dot"></span> 16道经典MBTI题目，科学分析你的性格</div>
                        <div class="feature-item"><span class="dot"></span> 结果附赠🔥今日SBTI热梗标签（朋友圈同款）</div>
                        <div class="feature-item"><span class="dot"></span> 简洁无广告，一键分享你的梗人格</div>
                    </div>
                    <button class="btn btn-primary" id="startTestBtn">🚀 开始测试 →</button>
                    <div style="margin-top: 16px; font-size:12px; color:#9CA3AF;">约3分钟 · 更懂自己</div>
                </div>
                <footer>#SBTI #死者 #吗喽 #人格测试</footer>
            </div>
        `;
        document.getElementById("startTestBtn")?.addEventListener("click", () => {
            testAnswers = new Array(QUESTIONS.length).fill(null);
            currentQuestionIndex = 0;
            computedType = "";
            dimensionData = null;
            hotStickerResult = null;
            currentPage = "test";
            render();
        });
    }

    // 测试页面渲染
    function renderTest() {
        const q = QUESTIONS[currentQuestionIndex];
        const selectedVal = testAnswers[currentQuestionIndex];
        const total = QUESTIONS.length;
        const answeredCount = testAnswers.filter(a => a !== null).length;
        const progressPercent = (answeredCount / total) * 100;

        const optionAClass = selectedVal === 0 ? "active" : "";
        const optionBClass = selectedVal === 1 ? "active" : "";

        const html = `
            <div class="page">
                <div class="card">
                    <div class="progress-section">
                        <div class="progress-bar-bg"><div class="progress-fill" style="width: ${progressPercent}%;"></div></div>
                        <div class="progress-text"><span>第 ${currentQuestionIndex+1} / ${total} 题</span><span>完成度 ${Math.floor(progressPercent)}%</span></div>
                    </div>
                    <div class="question-text">${escapeHtml(q.text)}</div>
                    <div class="options">
                        <div class="option-item ${optionAClass}" data-opt="0">
                            <div class="option-marker">A</div>
                            <div class="option-text">${escapeHtml(q.optionA)}</div>
                        </div>
                        <div class="option-item ${optionBClass}" data-opt="1">
                            <div class="option-marker">B</div>
                            <div class="option-text">${escapeHtml(q.optionB)}</div>
                        </div>
                    </div>
                    <div class="nav-buttons">
                        <button class="btn btn-outline" id="prevBtn" ${currentQuestionIndex === 0 ? 'disabled style="opacity:0.5"' : ''}>◀ 上一题</button>
                        <button class="btn btn-primary" id="nextBtn">${currentQuestionIndex === total-1 ? '完成 ✓ 看结果' : '下一题 ▶'}</button>
                    </div>
                </div>
                <footer>凭直觉选择，越真实越有趣</footer>
            </div>
        `;
        app.innerHTML = html;

        const opt0 = document.querySelector('.option-item[data-opt="0"]');
        const opt1 = document.querySelector('.option-item[data-opt="1"]');
        if (opt0) opt0.addEventListener('click', () => selectAnswer(0));
        if (opt1) opt1.addEventListener('click', () => selectAnswer(1));

        document.getElementById("prevBtn")?.addEventListener("click", () => {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                render();
            }
        });
        document.getElementById("nextBtn")?.addEventListener("click", () => {
            if (testAnswers[currentQuestionIndex] === null) {
                alert("请先选择一个选项再继续～");
                return;
            }
            if (currentQuestionIndex === total - 1) {
                const allAnswered = testAnswers.every(v => v !== null);
                if (!allAnswered) {
                    const missing = testAnswers.reduce((cnt, v) => v === null ? cnt+1 : cnt, 0);
                    alert(`还有 ${missing} 道题未完成，请返回完成所有题目再提交。`);
                    return;
                }
                // 计算结果
                const mbti = computeMBTI(testAnswers);
                const dims = getDimensionPercentages(testAnswers);
                // 获取原始维度得分用于热梗
                let rawScores = { EI:0, SN:0, TF:0, JP:0 };
                QUESTIONS.forEach((q, idx) => {
                    if (testAnswers[idx] === 0) rawScores[q.dimension] += 1;
                });
                const hot = getHotSticker(rawScores, mbti);
                computedType = mbti;
                dimensionData = dims;
                hotStickerResult = hot;
                currentPage = "result";
                render();
            } else {
                currentQuestionIndex++;
                render();
            }
        });
    }

    function selectAnswer(optValue) {
        testAnswers[currentQuestionIndex] = optValue;
        render();  // 刷新高亮
    }

    // 结果页 - 经典MBTI + 热梗标签
    function renderResult() {
        if (!computedType || !dimensionData) {
            computedType = computeMBTI(testAnswers);
            dimensionData = getDimensionPercentages(testAnswers);
            let rawScores = { EI:0, SN:0, TF:0, JP:0 };
            QUESTIONS.forEach((q, idx) => {
                if (testAnswers[idx] === 0) rawScores[q.dimension] += 1;
            });
            hotStickerResult = getHotSticker(rawScores, computedType);
        }
        const typeInfo = TYPE_DETAILS[computedType] || TYPE_DETAILS["INFP"];
        const dims = dimensionData;
        const hot = hotStickerResult;

        const renderDimBar = (dimKey, label, left, right) => {
            const data = dims[dimKey];
            const percent = data.percent;
            const leftPercent = percent;
            return `
                <div class="dimension-row">
                    <div class="dimension-label">${label}</div>
                    <div style="display: flex; flex:1; align-items: center; gap: 8px;">
                        <span style="font-weight:500; font-size:14px;">${left}</span>
                        <div class="dimension-bar-container"><div class="dimension-bar" style="width: ${leftPercent}%;"></div></div>
                        <span style="font-weight:500; font-size:14px;">${right}</span>
                    </div>
                    <div class="dimension-percent">${Math.round(leftPercent)}% / ${Math.round(100-leftPercent)}%</div>
                </div>
            `;
        };

        const html = `
            <div class="page">
                <div class="card" style="padding: 28px 20px;">
                    <div class="result-type">
                        <div class="result-badge">${computedType}</div>
                        <div class="result-name">${typeInfo.name}</div>
                        <div class="result-desc">${typeInfo.desc}</div>
                    </div>
                    
                    <!-- 🔥 今日SBTI热梗卡片 (朋友圈同款) -->
                    <div class="hot-tag-card">
                        <div class="hot-tag-title">
                            <span>🔥 今日SBTI热梗认证</span> <span>${hot.emoji}</span>
                        </div>
                        <div class="hot-tag-name">${hot.name}</div>
                        <div class="hot-tag-desc">${hot.desc}</div>
                        <div style="margin-top: 12px; font-size: 12px; color:#B45309;">✨ 最近朋友圈刷屏的同款标签，纯属娱乐，快乐自嘲 ✨</div>
                    </div>
                    
                    <div style="margin: 16px 0 8px; font-weight: 600;">📊 MBTI维度倾向</div>
                    ${renderDimBar("EI", "精力", "E 外向", "I 内向")}
                    ${renderDimBar("SN", "认知", "S 实感", "N 直觉")}
                    ${renderDimBar("TF", "判断", "T 思考", "F 情感")}
                    ${renderDimBar("JP", "态度", "J 判断", "P 感知")}
                    
                    <div class="action-buttons">
                        <button class="btn btn-outline" id="restartBtn">🔄 重新测试</button>
                        <button class="btn btn-primary" id="homeBtn">🏠 返回首页</button>
                    </div>
                    <div style="margin-top: 16px; text-align: center; font-size: 12px; color:#9CA3AF;">分享你的SBTI热梗给朋友，看看谁是“死者”谁是“尤物”～</div>
                </div>
                <footer>MBTI科学参考 · 热梗源自网络潮流 | 做真实的自己</footer>
            </div>
        `;
        app.innerHTML = html;
        document.getElementById("restartBtn")?.addEventListener("click", () => {
            testAnswers = new Array(QUESTIONS.length).fill(null);
            currentQuestionIndex = 0;
            computedType = "";
            dimensionData = null;
            hotStickerResult = null;
            currentPage = "test";
            render();
        });
        document.getElementById("homeBtn")?.addEventListener("click", () => {
            testAnswers = new Array(QUESTIONS.length).fill(null);
            currentQuestionIndex = 0;
            computedType = "";
            dimensionData = null;
            hotStickerResult = null;
            currentPage = "index";
            render();
        });
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    render();
</script>
</body>
</html>
