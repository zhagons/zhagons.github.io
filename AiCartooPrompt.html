<!DOCTYPE html>
<html lang="zh-cn">

<head>
  <meta charset="UTF-8">
  <title>AI漫剧分镜提示词大全</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --primary-gradient-start: #4a00e0;
      --primary-gradient-end: #8e2de2;
      --secondary-color: #00c9ff;
      --background-dark: #0f0c29;
      --card-bg: rgba(30, 25, 60, 0.7);
      --sidebar-bg: rgba(25, 20, 50, 0.8);
      --text-primary: #e0e6ff;
      --text-secondary: #a0a9ff;
      --accent-color: #ff6ec4;
      --success-color: #7effae;
      --danger-color: #ff6b6b;
      --border-radius: 16px;
      --shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
      --transition: all 0.3s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'JetBrains Mono', 'Consolas', 'PingFang SC', Arial, sans-serif;
      background: linear-gradient(135deg, var(--background-dark), #23215e);
      margin: 0;
      padding: 0;
      color: var(--text-primary);
      min-height: 100vh;
      backdrop-filter: blur(10px);
    }

    header {
      background: linear-gradient(135deg, #21093a 0%, #103169 100%);
      color: #fff;
      padding: 15px 0;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      letter-spacing: 1px;
      position: relative;
      z-index: 2;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    h1 {
      margin: 0;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
      background: linear-gradient(to right, #ffffff, #e0f7ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header>div {
      font-size: 0.85rem;
      opacity: .7;
      margin-top: 4px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
    }

    .main-layout {
      display: flex;
      max-width: 1400px;
      margin: 15px auto;
      padding: 0 15px;
      gap: 20px;
    }

    .side-bar {
      min-width: 180px;
      max-width: 220px;
      background: var(--sidebar-bg);
      border-radius: var(--border-radius);
      box-shadow: var(--shadow);
      padding: 20px 15px;
      height: fit-content;
      position: sticky;
      top: 20px;
      align-self: flex-start;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
    }

    .side-bar-title {
      font-size: 1.2rem;
      color: var(--secondary-color);
      font-weight: 700;
      margin-bottom: 18px;
      letter-spacing: 1px;
      text-align: center;
      text-shadow: 0 0 10px rgba(0, 201, 255, 0.5);
    }

    .style-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .style-btn {
      background: rgba(40, 30, 80, 0.6);
      color: var(--text-secondary);
      border: 1px solid rgba(142, 45, 226, 0.4);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 1rem;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
      text-align: left;
      font-weight: 600;
      letter-spacing: 0.5px;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(5px);
    }

    .style-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg,
          transparent,
          rgba(255, 255, 255, 0.2),
          transparent);
      transition: var(--transition);
    }

    .style-btn:hover::before {
      left: 100%;
    }

    .style-btn.active,
    .style-btn:hover {
      background: linear-gradient(90deg, var(--primary-gradient-start), var(--primary-gradient-end));
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 6px 15px rgba(142, 45, 226, 0.4);
      transform: translateY(-2px);
    }

    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--border-radius);
      box-shadow: var(--shadow);
      padding: 25px;
      margin-bottom: 20px;
      animation: fadeIn 0.6s ease-out;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    .info-block {
      margin-bottom: 16px;
      font-size: 1.05rem;
      color: var(--secondary-color);
      display: flex;
      align-items: center;
    }

    .info-block strong {
      color: #fff;
      font-weight: 700;
      min-width: 90px;
      margin-right: 12px;
    }

    .shots-list {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 20px;
    }

    .shot-card {
      flex: 1 1 calc(50% - 20px);
      min-width: 260px;
      background: rgba(40, 30, 80, 0.5);
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.25);
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-left: 4px solid var(--primary-gradient-end);
      position: relative;
      transition: var(--transition);
      backdrop-filter: blur(5px);
      border: 1px solid rgba(142, 45, 226, 0.3);
    }

    .shot-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(142, 45, 226, 0.4);
      border-left: 4px solid var(--secondary-color);
    }

    .shot-card-content {
      display: flex;
      flex-direction: row;
      gap: 15px;
    }

    .shot-image {
      min-width: 112px;
      height: 150px;
      background-size: cover;
      background-position: center;
      border-radius: 6px;
      flex-shrink: 0;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .shot-content {
      flex: 1;
    }

    .shot-type {
      font-weight: bold;
      color: var(--secondary-color);
      font-size: 1.1rem;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
    }

    .shot-type::before {
      content: "▶";
      margin-right: 8px;
      font-size: 0.7rem;
      color: var(--accent-color);
    }

    .shot-desc {
      color: var(--text-primary);
      font-size: 0.95rem;
      margin-bottom: 16px;
      line-height: 1.6;
      flex-grow: 1;
    }

    .copy-btn {
      align-self: flex-start;
      background: linear-gradient(90deg, var(--primary-gradient-start), var(--primary-gradient-end));
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 8px 20px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 3px 10px rgba(142, 45, 226, 0.4);
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-top: 8px;
    }

    .copy-btn:hover {
      background: linear-gradient(90deg, var(--primary-gradient-end), var(--primary-gradient-start));
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(142, 45, 226, 0.6);
    }

    .copy-btn:active {
      transform: translateY(0);
    }

    .supplementary,
    .negative {
      margin: 12px 0;
      font-size: 1rem;
      padding: 10px 12px;
      border-radius: 6px;
      background: rgba(40, 30, 80, 0.4);
    }

    .supplementary {
      color: var(--success-color);
      border-left: 3px solid var(--success-color);
    }

    .negative {
      color: var(--danger-color);
      border-left: 3px solid var(--danger-color);
    }

    ::selection {
      background: rgba(142, 45, 226, 0.5);
      color: var(--text-primary);
    }

    @media (max-width: 992px) {
      .main-layout {
        flex-direction: column;
        margin: 15px auto;
        padding: 0 12px;
        gap: 15px;
      }

      .side-bar {
        position: static;
        margin: 0 0 15px 0;
        width: 100%;
        max-width: 100vw;
        overflow-x: auto;
        white-space: nowrap;
        padding: 12px 8px;
        min-width: unset;
        scrollbar-width: thin;
        scrollbar-color: var(--primary-gradient-end) var(--sidebar-bg);
      }

      .side-bar::-webkit-scrollbar {
        height: 5px;
      }

      .side-bar::-webkit-scrollbar-track {
        background: var(--sidebar-bg);
      }

      .side-bar::-webkit-scrollbar-thumb {
        background: var(--primary-gradient-end);
        border-radius: 3px;
      }

      /* 新增：风格分类横向滚动 */
      .style-list {
        flex-direction: row;
        overflow-x: auto;
        white-space: nowrap;
        gap: 10px;
        scrollbar-width: thin;
        scrollbar-color: var(--primary-gradient-end) var(--sidebar-bg);
      }

      .style-btn {
        flex: 0 0 auto;
        min-width: 100px;
        white-space: normal;
      }

      .container {
        padding: 0;
      }

      .card {
        padding: 20px 15px;
      }

      .shots-list {
        flex-direction: column;
        gap: 18px;
      }

      .shot-card {
        max-width: 100%;
        min-width: 0;
        padding: 18px 15px;
      }

      .shot-card-content {
        flex-direction: column;
      }

      .shot-image {
        min-width: 100%;
        height: 400px;
        margin-bottom: 12px;
      }
    }

    @media (max-width: 600px) {
      .main-layout {
        margin: 12px auto;
        padding: 0 8px;
        gap: 12px;
      }

      .side-bar {
        padding: 12px 5px;
      }

      .style-btn {
        min-width: 100px;
        padding: 8px 12px;
        font-size: 0.85rem;
      }

      .card {
        padding: 16px 12px;
      }

      h1 {
        font-size: 1.6rem;
      }

      .shot-card {
        padding: 15px 12px;
      }

      .shot-desc {
        font-size: 0.9rem;
      }

      .shot-image {
        height: 180px;
      }
    }
  </style>
</head>

    // 渲染风格按钮
    const styleList = document.getElementById('styleList');
    const styleDetail = document.getElementById('styleDetail');
    let currentIdx = 0;

    function renderStyleButtons() {
      styleList.innerHTML = '';
      data.forEach((item, idx) => {
        const btn = document.createElement('button');
        btn.className = 'style-btn' + (idx === currentIdx ? ' active' : '');
        btn.textContent = item.style;
        btn.onclick = () => {
          currentIdx = idx;
          renderStyleButtons();
          renderStyleDetail();
        };
        styleList.appendChild(btn);
      });
    }

    function renderStyleDetail() {
      const item = data[currentIdx];
      const defaultImage = 'url(./images/default.png)'; // 默认图片路径
      item.image = 'url(./images/' + item.style + '.png), ' + defaultImage; // 替换为本地图片路径
      let html = '<div class="card">';
      html += `<div class='info-block'><strong>适配：</strong>${item.suitableFor}</div>`;
      html += `<div class='info-block'><strong>核心场景：</strong>${item.coreScene}</div>`;
      html += `<div class='shots-list'>`;
      item.shots.forEach(shot => {
        // 获取当前分镜类型在数组中的索引
        const shotIndex = item.shots.indexOf(shot);
        html += `<div class='shot-card'>`;
        html += `<div class='shot-card-content'>`;
        html += `<div class='shot-image' style='background-image: ${item.image}'></div>`;
        html += `<div class='shot-content'>`;
        html += `<div class='shot-type'>${shot.type}</div>`;
        html += `<div class='shot-desc'>${shot.desc}</div>`;
        html += `<button class='copy-btn' onclick="navigator.clipboard.writeText('${shot.desc.replace(/'/g, "\'")}');this.textContent='已复制';setTimeout(()=>this.textContent='复制',1000)">复制</button>`;
        html += `</div>`;
        html += `</div>`;
        html += `</div>`;
      });
      html += `</div>`;
      html += `<div class='supplementary'><strong>补充适配：</strong>${item.supplementary}</div>`;
      html += `<div class='negative'><strong>负面提示词：</strong>${item.negativePrompts}</div>`;
      html += '</div>';
      styleDetail.innerHTML = html;
    }

    renderStyleButtons();
    renderStyleDetail();
  </script>
